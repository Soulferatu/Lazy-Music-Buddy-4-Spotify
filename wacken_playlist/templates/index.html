<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111111">
    <title>Wacken Playlist Buddy</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <section class="intro">
        <p class="eyebrow">Wacken Open Air playlist builder</p>
        <h1>Wacken Playlist Buddy</h1>
        <p class="lede">
          Choose festival bands, preview their Spotify tracks, and generate a shareable playlist.
        </p>
      </section>

      <section class="panel" aria-labelledby="stage-title">
        <div>
          <p class="eyebrow">Stage 0</p>
          <h2 id="stage-title">App shell is running</h2>
        </div>
        <p>
          The project baseline is ready. Next up: Wacken 2026 band data, selection controls, and playlist naming.
        </p>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
  </body>
</html>
